name: Submit Application to B12

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

jobs:
  submit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Submit application to B12
        run: |
          python b12_submit.py \
            --name "${{ secrets.APPLICANT_NAME }}" \
            --email "${{ secrets.APPLICANT_EMAIL }}" \
            --resume-link "https://xqubf15dwuu6oksg.public.blob.vercel-storage.com/Soumith_Inturi.pdf" \
            --repository-link "https://github.com/soumithinturi/b12-application" \
            --action-run-link "https://github.com/soumithinturi/b12-application/actions/runs/${{ github.run_id }}"
        env:
          # Optional: override signing secret via environment variable
          B12_SIGNING_SECRET: ${{ secrets.B12_SIGNING_SECRET }}
